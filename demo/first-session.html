<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Patterns of Choice — Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Calm, not warm; serious, not academic. The aesthetic deliberately
       mirrors the design principles in onboarding.md. */
    :root {
      --bg: #fafaf7;
      --fg: #1f1f1d;
      --muted: #6b6b67;
      --border: #d8d8d2;
      --accent: #2a4a3a;
      --warn: #8a4a2a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 0;
      line-height: 1.5;
      font-size: 17px;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
      min-height: 100vh;
    }
    h1 {
      font-weight: 400;
      font-size: 28px;
      margin: 0 0 8px;
    }
    .subhead {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 32px;
    }
    h2 {
      font-weight: 500;
      font-size: 22px;
      margin: 0 0 16px;
    }
    p { margin: 0 0 16px; }
    .body-text { margin-bottom: 24px; }
    button {
      font-family: inherit;
      font-size: 17px;
      background: white;
      color: var(--fg);
      border: 1.5px solid var(--border);
      padding: 14px 20px;
      margin: 6px 0;
      cursor: pointer;
      border-radius: 4px;
      text-align: left;
      width: 100%;
      transition: border-color 120ms, background-color 120ms;
    }
    button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      text-align: center;
    }
    button.primary:hover { background: #1c3528; }
    button.secondary {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
      text-align: center;
    }
    .item-prompt {
      font-size: 18px;
      margin-bottom: 16px;
      min-height: 60px;
    }
    .timer {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }
    .timer.warn { color: var(--warn); }
    .observation {
      background: white;
      padding: 20px;
      border-radius: 4px;
      border-left: 3px solid var(--accent);
      font-style: italic;
      color: var(--fg);
      margin: 24px 0;
    }
    .demo-banner {
      background: #fef9e7;
      border-top: 1px solid #e0c850;
      border-bottom: 1px solid #e0c850;
      padding: 8px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--warn);
    }
    .meta { font-size: 13px; color: var(--muted); margin-top: 32px; }
    .meta code {
      background: white;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .cta-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .cta-row button { margin: 0; }
  </style>
</head>
<body>

<div class="demo-banner">
  Demo only — this is a static rendering of one quick-fire scenario.
  Production runtime is open per <code>DECISIONS.md §14</code>.
</div>

<div class="container" id="app"></div>

<script>
// ============================================================================
// Embedded scenario data — sourced from scenarios/sample/qf-truth-001.json.
// In the production runtime, scenarios would be loaded from the corpus per
// the rotation logic in mvp.md §"Session protocol".
// ============================================================================

const SCENARIO = {
  id: "qf-truth-001",
  metadata: {
    title: "Quick-fire: Small lies in everyday contexts",
    timer_seconds_per_item: 8,
  },
  items: [
    {
      id: "qf-truth-001-i01",
      prompt: "Your housemate asks if you ate the leftovers they were saving. You did.",
      options: [
        { id: "a", text: "Admit it." },
        { id: "b", text: "Say you didn't see them." },
      ],
    },
    {
      id: "qf-truth-001-i02",
      prompt: "A friend you don't see often asks if you liked their painting. You didn't.",
      options: [
        { id: "a", text: "Say you loved it." },
        { id: "b", text: "Say it wasn't quite your taste." },
      ],
    },
    {
      id: "qf-truth-001-i03",
      prompt: "A customer-service agent asks if you've already used the discount code. You have.",
      options: [
        { id: "a", text: "Tell them yes." },
        { id: "b", text: "Tell them no." },
      ],
    },
    {
      id: "qf-truth-001-i04",
      prompt: "A senior colleague asks during a meeting if you've read the doc they sent. You haven't.",
      options: [
        { id: "a", text: "Admit you haven't yet." },
        { id: "b", text: "Imply you have." },
      ],
    },
    {
      id: "qf-truth-001-i05",
      prompt: "An online survey, anonymous and unverifiable, asks how many hours you exercised this week. You did less than half what your aspirational answer would be.",
      options: [
        { id: "a", text: "Report it accurately." },
        { id: "b", text: "Inflate it." },
      ],
    },
    {
      id: "qf-truth-001-i06",
      prompt: "A direct report asks if their recent work has been good. You think it's been mediocre.",
      options: [
        { id: "a", text: "Say it's been good." },
        { id: "b", text: "Say there are some things you want to talk through." },
      ],
    },
  ],
};

// ============================================================================
// Session log — populated as the user interacts. Renders to console at end.
// ============================================================================
const sessionLog = {
  scenarioId: SCENARIO.id,
  startTime: null,
  endTime: null,
  itemResponses: [],
};

// ============================================================================
// Rendering — each call replaces #app contents with a new screen
// ============================================================================
const app = document.getElementById("app");

function render(html) {
  app.innerHTML = html;
}

function renderOpening() {
  render(`
    <h1>Patterns of Choice</h1>
    <div class="subhead">A mirror for the values you live by, alongside the ones you say you live by.</div>
    <div class="body-text">
      <p>This is a daily practice — five minutes a session, three to four weeks before you'll see anything resembling a profile. It will ask you to make small choices and to describe what you care about.</p>
      <p>It will then show you where those two things line up and where they don't. It will not tell you whether your patterns are good or bad.</p>
    </div>
    <button class="primary" onclick="renderCandor()">Begin</button>
    <div class="meta">
      Demo note: this demo skips the inventory module and renders only one
      quick-fire scenario. The full first session per
      <code>first-session-walkthrough.md</code> also includes a 20-value
      card sort, a story prompt, and the session-end observation.
    </div>
  `);
}

function renderCandor() {
  render(`
    <h2>Before you start</h2>
    <div class="body-text">
      <p>There's something to be honest about up front. The premise of this instrument — that small everyday choices reveal something useful about how you actually live — is not fully established in the research literature.</p>
      <p>Studies of trolley problems and abstract dilemmas have repeatedly failed to predict real behavior. Studies of mundane stakes (small monetary honesty, everyday cooperation) have done better, but no one has yet validated this specific format — a daily-puzzle structure with continuing characters and reflection over weeks. Whether it works is partly what we are figuring out together. Your data shapes that.</p>
      <p>If that uncertainty would make you not want to start, this is the right moment to step away.</p>
    </div>
    <div class="cta-row">
      <button class="primary" onclick="renderQuickfireIntro()">Continue</button>
      <button class="secondary" onclick="renderStepAway()">Step away</button>
    </div>
  `);
}

function renderStepAway() {
  render(`
    <h2>Stepped away</h2>
    <div class="body-text">
      <p>That's a fine choice. The 'step away' CTA in the production app would not nag, retarget, or attempt to reconvert. Your decision is logged (per consent) for the eventual study's estimate of ecological-validity-related attrition.</p>
      <p>You can close this tab.</p>
    </div>
    <button class="secondary" onclick="renderOpening()">Start over (demo)</button>
  `);
}

function renderQuickfireIntro() {
  render(`
    <h2>A new kind of task</h2>
    <div class="body-text">
      <p>Rapid choices under a timer. Each one is between two options, eight seconds each.</p>
      <p>The point is to capture what you reach for first — not what you'd choose on reflection. There are no right answers and the timer is part of the data, not part of a test.</p>
    </div>
    <button class="primary" onclick="startQuickfire()">Ready</button>
  `);
}

let currentItemIndex = 0;
let timerInterval = null;

function startQuickfire() {
  sessionLog.startTime = new Date().toISOString();
  currentItemIndex = 0;
  renderQuickfireItem();
}

function renderQuickfireItem() {
  if (currentItemIndex >= SCENARIO.items.length) {
    renderSessionEnd();
    return;
  }

  const item = SCENARIO.items[currentItemIndex];
  const itemStartTime = Date.now();
  let timeLeft = SCENARIO.metadata.timer_seconds_per_item;

  render(`
    <div class="timer" id="timer">⏱  ${timeLeft} seconds</div>
    <div class="item-prompt">${item.prompt}</div>
    <button onclick="answer('${item.id}', 'a', ${itemStartTime})">${item.options[0].text}</button>
    <button onclick="answer('${item.id}', 'b', ${itemStartTime})">${item.options[1].text}</button>
    <div class="meta">Item ${currentItemIndex + 1} of ${SCENARIO.items.length}</div>
  `);

  // Start timer
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft -= 1;
    const timerEl = document.getElementById("timer");
    if (timerEl) {
      timerEl.textContent = `⏱  ${timeLeft} seconds`;
      if (timeLeft <= 3) timerEl.classList.add("warn");
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      answer(item.id, null, itemStartTime); // timeout
    }
  }, 1000);
}

function answer(itemId, optionId, itemStartTime) {
  if (timerInterval) clearInterval(timerInterval);
  const responseTime = Date.now() - itemStartTime;
  sessionLog.itemResponses.push({
    itemId,
    optionId,
    responseTimeMs: responseTime,
    wasTimeout: optionId === null,
  });
  currentItemIndex += 1;
  renderQuickfireItem();
}

function renderSessionEnd() {
  sessionLog.endTime = new Date().toISOString();
  console.log("Session log:", sessionLog);

  // Generate a simple observation. In the production runtime this would be
  // descriptive (referring to specific tag patterns), never evaluative.
  const choseA = sessionLog.itemResponses.filter(r => r.optionId === "a").length;
  const choseB = sessionLog.itemResponses.filter(r => r.optionId === "b").length;
  const timeouts = sessionLog.itemResponses.filter(r => r.wasTimeout).length;
  const observation = makeObservation(choseA, choseB, timeouts);

  render(`
    <h2>Done for today.</h2>
    <div class="observation">${observation}</div>
    <div class="body-text">
      <p>See you tomorrow. About the same time, if that works.</p>
    </div>
    <button class="secondary" onclick="renderOpening()">Run the demo again</button>
    <div class="meta">
      Session data has been logged to the browser console.
      In production this would persist locally (IndexedDB) and optionally sync
      end-to-end encrypted per <code>pilot-materials/data-handling-policy.md</code>.
    </div>
  `);
}

function makeObservation(a, b, timeouts) {
  // The production runtime would use the tag-axis map to make a substantive
  // domain-specific observation. This demo is descriptive about the surface
  // pattern only.
  if (timeouts >= 2) {
    return "Two or more items timed out today. Sometimes the timer is the data.";
  }
  if (a > b * 2) {
    return "You leaned consistently toward the first option in each pair today. Worth noticing whether that's a habit, a default, or something the items had in common.";
  }
  if (b > a * 2) {
    return "You leaned consistently toward the second option today. Worth noticing whether that's a habit, a default, or something the items had in common.";
  }
  return "Your choices were mixed today. That's neutral — neither a sign of inconsistency nor of considered balance, just a mid-distribution session.";
}

// Start
renderOpening();
</script>

</body>
</html>
